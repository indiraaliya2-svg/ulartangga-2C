const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playTone(freq, dur, type='square', vol=0.15) {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function togglePlayer(idx) {
  const el = document.querySelectorAll('.player-selector')[idx];
  if (selectedPlayers.has(idx)) {
    selectedPlayers.delete(idx);
    el.style.boxShadow = 'none';
    el.style.transform = 'scale(1)';
  } else {
    selectedPlayers.add(idx);
    el.style.boxShadow = `0 0 0 3px ${PLAYERS_DEF[idx].color}`;
    el.style.transform = 'scale(1.08)';
  }
  const n = selectedPlayers.size;
  document.getElementById('selected-count').textContent = n < 2 ? `Pilih minimal 2 pemain (${n}/5)` : `${n} pemain dipilih ✓`;
  const btn = document.getElementById('start-btn');
  btn.disabled = n < 2;
  btn.className = n >= 2
    ? 'w-full py-3 rounded-xl font-black text-white text-lg bg-gradient-to-r from-purple-500 to-pink-500 hover:scale-105 transition-all cursor-pointer'
    : 'w-full py-3 rounded-xl font-black text-white text-lg bg-gray-300 cursor-not-allowed transition-all';
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function generateSnakesAndLadders() {
  snakes = {}; ladders = {};
  // Pick random positions for snakes and ladders
  const available = [];
  for (let i = 3; i <= 29; i++) available.push(i);
  const shuffled = shuffle(available);
  
  // 4 snakes: head > tail
  for (let i = 0; i < 4; i++) {
    const head = shuffled[i];
    // tail is lower
    const minTail = Math.max(2, head - 12);
    const maxTail = head - 3;
    if (maxTail < minTail) continue;
    const tail = minTail + Math.floor(Math.random() * (maxTail - minTail + 1));
    snakes[head] = tail;
  }
  
  // 4 ladders: bottom < top
  for (let i = 4; i < 8; i++) {
    const bottom = shuffled[i];
    if (snakes[bottom]) continue;
    const minTop = bottom + 3;
    const maxTop = Math.min(29, bottom + 12);
    if (minTop > maxTop) continue;
    const top = minTop + Math.floor(Math.random() * (maxTop - minTop + 1));
    if (snakes[top]) continue;
    ladders[bottom] = top;
  }
}

function getCellPos(num) {
  // Board layout: row 0 = bottom (cells 1-6), zigzag
  const idx = num - 1;
  const row = Math.floor(idx / 6);
  let col = idx % 6;
  if (row % 2 === 1) col = 5 - col; // zigzag
  const gridRow = 4 - row; // flip so row 0 is at bottom
  return { row: gridRow, col };
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 6; c++) {
      // Convert grid position to cell number
      const boardRow = 4 - r;
      const col = boardRow % 2 === 0 ? c : 5 - c;
      const num = boardRow * 6 + col + 1;
      
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${num}`;
      cell.style.background = CELL_COLORS[num - 1];
      cell.style.aspectRatio = '1';
      cell.style.minHeight = '48px';
      cell.style.border = '2px solid rgba(0,0,0,0.08)';
      
      let content = '';
      if (num === 1) content = '<span class="text-xs">🏁</span>';
      else if (num === 30) content = '<span class="text-xs">🏆</span>';
      else if (snakes[num]) content = '<span class="snake-icon">🐍</span>';
      else if (ladders[num]) content = '<span class="ladder-icon">🪜</span>';
      
      cell.innerHTML = `<span class="cell-num">${num}</span>${content}`;
      board.appendChild(cell);
    }
  }
}

function placePions() {
  // Remove existing pions
  document.querySelectorAll('.pion').forEach(p => p.remove());
  
  players.forEach((p, i) => {
    const pion = document.createElement('div');
    pion.className = 'pion';
    pion.id = `pion-${i}`;
    pion.style.background = p.color;
    pion.textContent = p.icon;
    pion.style.fontSize = '10px';
    
    const cellEl = document.getElementById(`cell-${p.pos}`);
    if (cellEl) {
      // Offset multiple pions on same cell
      const sameCell = players.filter((pp, ii) => ii < i && pp.pos === p.pos).length;
      pion.style.bottom = `${2 + sameCell * 8}px`;
      pion.style.right = `${2 + sameCell * 6}px`;
      cellEl.appendChild(pion);
    }
  });
}

function updateScores() {
  const list = document.getElementById('scores-list');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = `flex items-center gap-2 px-2 py-1 rounded-lg ${i === currentPlayerIdx ? 'ring-2' : ''}`;
    div.style.background = i === currentPlayerIdx ? p.bg : 'transparent';
    div.style.ringColor = p.color;
    div.innerHTML = `
      <span style="color:${p.color}" class="font-black text-sm">${p.icon}</span>
      <span class="text-xs font-bold flex-1" style="color:${p.color}">${p.name}</span>
      <span class="text-xs font-black">${p.score}</span>
    `;
    list.appendChild(div);
  });
}

function updateCurrentPlayer() {
  const p = players[currentPlayerIdx];
  document.getElementById('current-player-display').innerHTML = `<span style="color:${p.color}">${p.icon} ${p.name}</span>`;
}

function startGame() {
  sfxStart();
  players = [...selectedPlayers].sort().map(idx => ({
    ...PLAYERS_DEF[idx],
    pos: 1,
    score: 0,
  }));
  currentPlayerIdx = 0;
  generateSnakesAndLadders();
  questions = shuffle([...ALL_QUESTIONS]);
  
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  
  buildBoard();
  placePions();
  updateScores();
  updateCurrentPlayer();
  document.getElementById('info-text').textContent = `${players[0].icon} ${players[0].name}, lempar dadu!`;
  gameStarted = true;
}

let questionIdx = 0;

async function rollDice() {
  if (isAnimating) return;
  isAnimating = true;
  
  const btn = document.getElementById('dice-btn');
  btn.disabled = true;
  btn.classList.add('dice-rolling');
  sfxDice();
  
  const result = Math.floor(Math.random() * 6) + 1;
  const diceEmojis = ['⚀','⚁','⚂','⚃','⚄','⚅'];
  
  // Animate dice
  let count = 0;
  const interval = setInterval(() => {
    btn.textContent = diceEmojis[Math.floor(Math.random() * 6)];
    count++;
    if (count > 8) {
      clearInterval(interval);
      btn.textContent = diceEmojis[result - 1];
      btn.classList.remove('dice-rolling');
      document.getElementById('dice-result').textContent = `Angka: ${result}`;
      movePlayer(result);
    }
  }, 80);
}

async function movePlayer(steps) {
  const p = players[currentPlayerIdx];
  const target = Math.min(p.pos + steps, 30);
  
  document.getElementById('info-text').textContent = `${p.icon} maju ${steps} langkah...`;
  
  // Step by step movement
  for (let i = p.pos + 1; i <= target; i++) {
    p.pos = i;
    placePions();
    sfxMove();
    await delay(250);
  }
  
  // Check finish
  if (p.pos >= 30) {
    p.pos = 30;
    placePions();
    await delay(300);
    finishGame();
    return;
  }
  
  // Check snake or ladder
  if (snakes[p.pos]) {
    document.getElementById('info-text').textContent = `🐍 Ular! Turun ke ${snakes[p.pos]}`;
    sfxSnake();
    const pion = document.getElementById(`pion-${currentPlayerIdx}`);
    if (pion) pion.style.animation = 'snake-eat 0.6s ease';
    await delay(700);
    p.pos = snakes[p.pos];
    placePions();
  } else if (ladders[p.pos]) {
    document.getElementById('info-text').textContent = `🪜 Tangga! Naik ke ${ladders[p.pos]}`;
    sfxLadder();
    const pion = document.getElementById(`pion-${currentPlayerIdx}`);
    if (pion) pion.style.animation = 'ladder-climb 0.6s ease';
    await delay(700);
    p.pos = ladders[p.pos];
    placePions();
    
    if (p.pos >= 30) {
      p.pos = 30;
      placePions();
      await delay(300);
      finishGame();
      return;
    }
  }
  
  // Show question (not for cell 1)
  if (p.pos > 1) {
    await delay(300);
    showQuestion();
  } else {
    nextTurn();
  }
}

function showQuestion() {
  const q = questions[questionIdx % questions.length];
  questionIdx++;
  
  document.getElementById('q-text').textContent = q.q;
  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  
  const labels = ['a', 'b', 'c'];
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'w-full py-2 px-4 rounded-xl font-bold text-left transition-all hover:scale-102 text-sm';
    btn.style.background = ['#fef3c7', '#dbeafe', '#dcfce7'][i];
    btn.style.border = '2px solid ' + ['#fbbf24', '#60a5fa', '#4ade80'][i];
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => answerQuestion(i, q.a);
    opts.appendChild(btn);
  });
  
  document.getElementById('question-modal').classList.remove('hidden');
}

function answerQuestion(chosen, correct) {
  document.getElementById('question-modal').classList.add('hidden');
  
  const p = players[currentPlayerIdx];
  
  if (chosen === correct) {
    p.score += 10;
    sfxCorrect();
    document.getElementById('result-icon').textContent = '🎉';
    document.getElementById('result-text').textContent = 'Benar!';
    document.getElementById('result-text').style.color = '#16a34a';
    document.getElementById('result-sub').textContent = '+10 poin!';
  } else {
    sfxWrong();
    document.getElementById('result-icon').textContent = '😢';
    document.getElementById('result-text').textContent = 'Salah!';
    document.getElementById('result-text').style.color = '#dc2626';
    document.getElementById('result-sub').textContent = 'Jawaban: ' + ['a','b','c'][correct];
  }
  
  updateScores();
  document.getElementById('result-modal').classList.remove('hidden');
}

function closeResult() {
  document.getElementById('result-modal').classList.add('hidden');
  nextTurn();
}

function nextTurn() {
  currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
  updateCurrentPlayer();
  updateScores();
  const p = players[currentPlayerIdx];
  document.getElementById('info-text').textContent = `${p.icon} ${p.name}, lempar dadu!`;
  document.getElementById('dice-btn').disabled = false;
  isAnimating = false;
}

function finishGame() {
  sfxWin();
  const sorted = [...players].sort((a, b) => {
    if (a.pos === 30 && b.pos !== 30) return -1;
    if (b.pos === 30 && a.pos !== 30) return 1;
    return b.score - a.score;
  });
  
  const container = document.getElementById('finish-scores');
  container.innerHTML = '';
  sorted.forEach((p, i) => {
    const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
    const div = document.createElement('div');
    div.className = 'flex items-center gap-2 py-2 px-3 rounded-lg mb-1';
    div.style.background = p.bg;
    div.innerHTML = `
      <span class="text-lg">${medals[i]}</span>
      <span style="color:${p.color}" class="font-black">${p.icon} ${p.name}</span>
      <span class="ml-auto font-black">${p.score} poin</span>
      ${p.pos >= 30 ? '<span class="text-xs">🏆</span>' : ''}
    `;
    container.appendChild(div);
  });
  
  // Confetti
  const cc = document.getElementById('confetti-container');
  cc.innerHTML = '';
  const colors = ['#ef4444','#3b82f6','#22c55e','#eab308','#ec4899','#8b5cf6'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = Math.random() * 30 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 1 + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    cc.appendChild(piece);
  }
  
  document.getElementById('finish-modal').classList.remove('hidden');
  isAnimating = false;
}

function resetGame() {
  document.getElementById('finish-modal').classList.add('hidden');
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
  gameStarted = false;
  selectedPlayers.clear();
  document.querySelectorAll('.player-selector').forEach(el => {
    el.style.boxShadow = 'none';
    el.style.transform = 'scale(1)';
  });
  document.getElementById('selected-count').textContent = 'Pilih minimal 2 pemain';
  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.className = 'w-full py-3 rounded-xl font-black text-white text-lg bg-gray-300 cursor-not-allowed transition-all';
  document.getElementById('dice-result').textContent = '';
  questionIdx = 0;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
